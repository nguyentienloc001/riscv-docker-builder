name: Build RISC-V Toolchain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Toolchain target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - newlib
          - linux

env:
  REGISTRY: docker.io
  IMAGE_NAME: locnguyen96/riscv-toolchain
  UBUNTU_VERSION: "22.04"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [newlib, linux]
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max per build

    # Skip matrix entries if manual dispatch selects a specific target
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == matrix.target

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.target }}
            type=raw,value=${{ matrix.target }}-{{date 'YYYYMMDD'}}
            type=sha,prefix=${{ matrix.target }}-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TOOLCHAIN_TARGET=${{ matrix.target }}
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
        # Retry once on failure (transient network issues during clone)
        continue-on-error: true

      - name: Retry build on failure
        if: steps.build.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TOOLCHAIN_TARGET=${{ matrix.target }}
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Verify image (single platform)
        if: github.event_name != 'pull_request'
        run: |
          docker pull --platform linux/amd64 ${{ env.IMAGE_NAME }}:${{ matrix.target }}
          if [ "${{ matrix.target }}" = "linux" ]; then
            docker run --rm --platform linux/amd64 ${{ env.IMAGE_NAME }}:${{ matrix.target }} \
              riscv64-unknown-linux-gnu-gcc --version
          else
            docker run --rm --platform linux/amd64 ${{ env.IMAGE_NAME }}:${{ matrix.target }} \
              riscv64-unknown-elf-gcc --version
          fi
